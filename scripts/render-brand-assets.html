<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #111;
        padding: 24px;
      }
      .canvas {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        padding: 72px 80px 64px;
      }
      .canvas.navy {
        background: #050816;
      }
      .canvas.transparent {
        background: transparent;
      }
      .gold-stroke {
        fill: none;
        stroke: url(#goldStroke);
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .word-goldspire {
        font-family: Cinzel, "Times New Roman", serif;
        font-size: 54px;
        font-weight: 600;
        letter-spacing: 0.12em;
        background: linear-gradient(165deg, #f7e7a8 0%, #e8c75a 35%, #d4af37 60%, #9a7b1a 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .word-ventures {
        font-family: Montserrat, Inter, sans-serif;
        font-size: 19px;
        font-weight: 400;
        letter-spacing: 0.68em;
        background: linear-gradient(165deg, #f3dfa0 0%, #d4af37 55%, #a68428 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        padding-left: 0.68em;
      }
      .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }
      .text-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <svg width="0" height="0" aria-hidden="true">
      <defs>
        <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#f7e7a8" />
          <stop offset="0.45" stop-color="#d4af37" />
          <stop offset="1" stop-color="#8f7124" />
        </linearGradient>
        <linearGradient id="goldFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f3dfa0" />
          <stop offset="0.5" stop-color="#d4af37" />
          <stop offset="1" stop-color="#a68428" />
        </linearGradient>
      </defs>
    </svg>

    <div id="logo-navy" class="canvas navy">
      <div class="stack">
        <svg width="124" height="152" viewBox="0 0 120 148" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="30" y1="8" x2="90" y2="118" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#f7e7a8" />
              <stop offset="0.45" stop-color="#d4af37" />
              <stop offset="1" stop-color="#8f7124" />
            </linearGradient>
          </defs>
          <path fill="none" stroke="url(#g1)" stroke-width="2.4" stroke-linejoin="round" d="M60 8 L92 44 L84 78 L60 118 L36 78 L28 44 Z" />
          <path fill="none" stroke="url(#g1)" stroke-width="1.65" stroke-linecap="round" d="M42 78 V46 L60 26 L78 46 V78" />
          <path fill="none" stroke="url(#g1)" stroke-width="1.35" stroke-linecap="round" d="M51 78 V54 L60 44 L69 54 V78" />
          <path fill="none" stroke="url(#g1)" stroke-width="1.1" stroke-linecap="round" d="M60 78 V58" />
        </svg>
        <div class="text-block">
          <div class="word-goldspire">GOLDSPIRE</div>
          <div class="word-ventures">VENTURES</div>
        </div>
      </div>
    </div>

    <div id="logo-transparent" class="canvas transparent">
      <div class="stack">
        <svg width="124" height="152" viewBox="0 0 120 148" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g2" x1="30" y1="8" x2="90" y2="118" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#f7e7a8" />
              <stop offset="0.45" stop-color="#d4af37" />
              <stop offset="1" stop-color="#8f7124" />
            </linearGradient>
          </defs>
          <path fill="none" stroke="url(#g2)" stroke-width="2.4" stroke-linejoin="round" d="M60 8 L92 44 L84 78 L60 118 L36 78 L28 44 Z" />
          <path fill="none" stroke="url(#g2)" stroke-width="1.65" stroke-linecap="round" d="M42 78 V46 L60 26 L78 46 V78" />
          <path fill="none" stroke="url(#g2)" stroke-width="1.35" stroke-linecap="round" d="M51 78 V54 L60 44 L69 54 V78" />
          <path fill="none" stroke="url(#g2)" stroke-width="1.1" stroke-linecap="round" d="M60 78 V58" />
        </svg>
        <div class="text-block">
          <div class="word-goldspire">GOLDSPIRE</div>
          <div class="word-ventures">VENTURES</div>
        </div>
      </div>
    </div>

    <div id="mark-only" class="canvas transparent" style="padding: 24px">
      <svg width="124" height="152" viewBox="0 0 120 148" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g3" x1="30" y1="8" x2="90" y2="118" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#f7e7a8" />
            <stop offset="0.45" stop-color="#d4af37" />
            <stop offset="1" stop-color="#8f7124" />
          </linearGradient>
        </defs>
        <path fill="none" stroke="url(#g3)" stroke-width="2.4" stroke-linejoin="round" d="M60 8 L92 44 L84 78 L60 118 L36 78 L28 44 Z" />
        <path fill="none" stroke="url(#g3)" stroke-width="1.65" stroke-linecap="round" d="M42 78 V46 L60 26 L78 46 V78" />
        <path fill="none" stroke="url(#g3)" stroke-width="1.35" stroke-linecap="round" d="M51 78 V54 L60 44 L69 54 V78" />
        <path fill="none" stroke="url(#g3)" stroke-width="1.1" stroke-linecap="round" d="M60 78 V58" />
      </svg>
    </div>
  </body>
</html>
